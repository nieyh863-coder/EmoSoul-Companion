# 需提供 DB_PASSWORD、JWT_SECRET 等：可在仓库根目录放 .env，或
# docker compose --env-file backend/.env up -d
version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: yu-ni-xiang-ban-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:?设置 DB_PASSWORD，或使用 --env-file backend/.env}
      MYSQL_DATABASE: ${DB_NAME:-yu_ni_xiang_ban}
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端应用
  app:
    build: .
    container_name: yu-ni-xiang-ban-app
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=${DB_USER:-root}
      - DB_PASSWORD=${DB_PASSWORD:?设置 DB_PASSWORD}
      - DB_NAME=${DB_NAME:-yu_ni_xiang_ban}
      - JWT_SECRET=${JWT_SECRET:?设置 JWT_SECRET，或使用 --env-file backend/.env}
      - JWT_EXPIRES_IN=7d
      - JWT_EXPIRES_IN_REMEMBER=30d
      - MAX_LOGIN_ATTEMPTS=5
      - LOCK_TIME_MINUTES=15
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # 可选：Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: yu-ni-xiang-ban-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    restart: unless-stopped
    profiles:
      - with-nginx

volumes:
  mysql_data:
