# 本地开发：仅启动 MySQL，密码与库名来自环境变量（与 backend/.env 一致）
# 在 backend 目录执行：npm run db:up（会带上 --env-file ./.env）
# 或仓库根目录：docker compose --env-file backend/.env -f docker-compose.mysql-dev.yml up -d

services:
  mysql:
    image: mysql:8.0
    container_name: yu-ni-xiang-ban-mysql-dev
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:?请在 backend/.env 中设置 DB_PASSWORD，或使用 --env-file}
      MYSQL_DATABASE: ${DB_NAME:-yu_ni_xiang_ban}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_dev_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  mysql_dev_data:
